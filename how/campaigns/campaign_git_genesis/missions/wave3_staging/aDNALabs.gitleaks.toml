title = "aDNALabs.aDNA git-ops scan (extends aDNA baseline)"

[extend]
useDefault = true

[[allowlists]]
description = "Vendored/minified Obsidian plugin bundles (tracked) — generic-api-key FPs in minified JS. Fleet-wide FP (F-W3-b; same class as III/ScienceStanley/LAVentureGraph)."
paths = ['''^\.obsidian/plugins/''']

[[allowlists]]
description = "Non-secret prose/field FPs: 'access-grant alpha-posture' ceremony narrative (audit posture, not a credential) + 'signing_key_path' (a JSON field naming a FILE PATH, never key material)."
regexTarget = "line"
regexes = [
  '''alpha-posture''',
  '''signing_key_path''',
]
